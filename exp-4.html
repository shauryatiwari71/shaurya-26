<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>
</head>
<body>
    <h2>Student Result Program</h2>
    <script>
        var subjects=prompt("Enter No. of Subjects");
        var total=0;
        for(var i=1;i<=subjects;i++){
            var marks=prompt("Enter marks of Subjects"+i);
            total=total+Number(marks);
        }
        var average=total/subjects;
        var grade;
        var result;
        if(average>=60){
            grade="A";
            result="Pass";
        }
        else if(average>=50){
            grade="B";
            result="Pass";
        }
        else if(average>=40){
            grade="C";
            result="Pass";
        }
        else{
            grade="D";
            result="fail";
        }
        document.write("Total Marks="+total+"<br>");
        document.write("Average Marks="+average+"<br>");
        document.write("Grade="+grade+"<br>");
        document.write("Result="+result);
    </script>
</body>
</html>
