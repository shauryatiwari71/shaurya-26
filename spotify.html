<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=kk, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet"href="spotify.css">
</head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="https://static.vecteezy.com/system/resources/thumbnails/042/148/631/small_2x/spotify-logo-spotify-social-media-icon-free-png.png">Spotify</li>
            <li>Home</li>
            <li>About</li>
            <li>Collections</li>
            <li>Playlist</li>
        </ul>
    </nav>
    <div class="container">
        <div class="songList">
            <h1>Best of Yo-Yo Honey Singh-NO Copyright Sounds</h1>
            <div class="songItemContainer">
                <div class="songItem">
                    <img src="cover1.jpg" alt="1" height="50" width="50">
                    <span>Millionaire</span>
                    <span class="songlistplay"><span class="timestamp">05:34<i class="far fa-3x fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="cover2.jpg" alt="2" height="50" width="50">
                    <span>Love Dose</span>
                    <span class="songlistplay"><span class="timestamp">04:28<i class="far fa-3x fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="cover3.jpg" alt="3" height="50" width="50">
                    <span>Dope Shope</span>
                    <span class="songlistplay"><span class="timestamp">05:12<i class="far fa-3x fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="cover4.jpg" alt="4" height="50" width="50">
                    <span>Blue Eyes</span>
                    <span class="songlistplay"><span class="timestamp">06:54<i class="far fa-3x fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="cover5.jpg" alt="5" height="50" width="50">
                    <span>Brown Rang</span>
                    <span class="songlistplay"><span class="timestamp">04:07<i class="far fa-3x fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="cover6.jpg" alt="6" height="50" width="50">
                    <span>Desi Kalakaar</span>
                    <span class="songlistplay"><span class="timestamp">07:19<i class="far fa-3x fa-play-circle"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="cover7.jpg" alt="7" height="50" width="50">
                    <span>4 Bottle Vodka</span>
                    <span class="songlistplay"><span class="timestamp">08:13<i class="far fa-3x fa-play-circle"></i></span></span>
                </div>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>
    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" max="100">  
        <div class="icons">
             <i class="fas fa-3x fa-step-backward"></i>
             <i class="far fa-3x fa-play-circle"></i>
             <i class="fas fa-3x fa-step-forward"></i>
        </div>
        <div class="songInfo">
            <img src="playing.gif" width="50px"  alt="">Blue Eyes-Yo-Yo Honey Singh
        </div>                     
    </div>
    <script src="spotify.js"></script>
    <script src="https://kit.fontawesome.com/26504e4a1f.js" crossorigin="anonymous"></script>
</body>
</html>
